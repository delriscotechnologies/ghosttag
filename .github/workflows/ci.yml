name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Test CLI
        run: go test ./internal/cli

      - name: Test inspector integration
        run: go test ./internal/inspect -run '^(TestInspect|TestRejectsUnsupportedBytes)'

      - name: Test non-finite coordinates
        run: go test ./internal/inspect -run '^TestRejectsNonFiniteCoordinates$'

      - name: Test invalid XMP coordinates
        run: go test ./internal/inspect -run '^TestRejectsInvalidXMPDMSCoordinates$'

      - name: Test invalid EXIF coordinates
        run: go test ./internal/inspect -run '^TestRejectsInvalidEXIFDMSComponents$'

      - name: Test XMP namespaces and locations
        run: go test ./internal/inspect -run '^TestXMPRequiresKnownNamespacesAndKeepsLocationsSeparate$'

      - name: Test XMP incomplete descriptions
        run: go test ./internal/inspect -run '^TestXMPDoesNotCrossPairIncompleteDescriptions$'

      - name: Test invalid capture time
        run: go test ./internal/inspect -run '^TestInvalidCaptureTimeIsNotClassified$'

      - name: Test inspector JPEG
        run: go test ./internal/inspect -run '^TestJPEG'

      - name: Test inspector PNG
        run: go test ./internal/inspect -run '^TestPNG'

      - name: Test inspector limits and files
        run: go test ./internal/inspect -run '^(TestRejectsOversizedFile|TestRejectsSymlink|TestRejectsFIFO|TestSafeText|TestSanitizes|TestCollector)'

      - name: Test inspector full package
        run: go test ./internal/inspect

      - name: Test report
        run: go test ./internal/report

      - name: Test remaining packages
        run: go test ./internal/assessment ./internal/model ./cmd/ghosttag

      - name: Vet
        run: go vet ./...

      - name: Install command
        env:
          GOBIN: ${{ runner.temp }}/ghosttag-bin
        run: go install ./cmd/ghosttag

      - name: Build through Makefile
        if: runner.os != 'Windows'
        run: make build

  security:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Check known vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Fuzz image parsers
        if: matrix.os == 'ubuntu-latest'
        run: go test ./internal/inspect -run=^$ -fuzz=FuzzImageParsersDoNotPanic -fuzztime=5s

      - name: Fuzz metadata parsers
        if: matrix.os == 'ubuntu-latest'
        run: go test ./internal/inspect -run=^$ -fuzz=FuzzMetadataParsersDoNotPanic -fuzztime=5s

      - name: Fuzz XMP coordinates
        if: matrix.os == 'ubuntu-latest'
        run: go test ./internal/inspect -run=^$ -fuzz=FuzzXMPCoordinatesDoNotPanic -fuzztime=5s

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -buildvcs=false -trimpath -o "./bin/ghosttag-linux-${GOARCH}" ./cmd/ghosttag
